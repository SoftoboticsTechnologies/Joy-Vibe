<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;color:#2b2440;background:#fffdfb;}
  a{color:#7C4DFF;text-decoration:none;} a:hover{color:#FF5FA2;}
</style>
</helmet>
<div style="overflow-x:hidden;">
<dc-import name="SiteNav" active="contact" hint-size="100%,72px" style="position:sticky;top:0;z-index:50;"></dc-import>

<header style="padding:clamp(50px,6vw,80px) clamp(20px,5vw,64px) clamp(30px,4vw,44px);background:radial-gradient(120% 100% at 50% 0%,#fff2f8,#fdf6ff 60%,#f4fbff);text-align:center;">
  <span style="font-family:'Poppins';font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#FF5FA2;">Contact</span>
  <h1 style="font-family:'Poppins';font-weight:800;font-size:clamp(36px,5.5vw,60px);letter-spacing:-1.5px;margin:12px 0 0;background:linear-gradient(115deg,#FF5FA2,#7C4DFF);-webkit-background-clip:text;background-clip:text;color:transparent;">Book Your Celebration Today!</h1>
  <p style="font-size:clamp(15px,1.6vw,18px);line-height:1.7;color:#5c5674;max-width:620px;margin:16px auto 0;">From intimate home celebrations to grand clubhouse parties, we handle everything so you can enjoy every moment.</p>
</header>

<section style="padding:clamp(30px,4vw,60px) clamp(20px,5vw,64px) clamp(50px,7vw,90px);">
  <div style="max-width:620px;margin:0 auto;">
    <form onSubmit="{{ onSubmit }}" style="background:linear-gradient(160deg,#fff,#fdf6ff);border-radius:26px;padding:clamp(24px,3vw,38px);box-shadow:0 24px 50px rgba(124,77,255,.18);border:1px solid rgba(124,77,255,.08);">
      <sc-if value="{{ submitted }}" hint-placeholder-val="{{ false }}">
        <div style="text-align:center;padding:40px 10px;">
          <div style="font-size:56px;">🎉</div>
          <div style="font-family:'Poppins';font-weight:700;font-size:22px;margin-top:12px;color:#2b2440;">Thank you, {{ name }}!</div>
          <p style="font-size:15px;color:#5c5674;margin-top:8px;">We've received your request and will reach out soon to plan something magical.</p>
        </div>
      </sc-if>
      <sc-if value="{{ notSubmitted }}" hint-placeholder-val="{{ true }}">
        <div>
          <div style="font-family:'Poppins';font-weight:700;font-size:20px;color:#2b2440;">Tell us about your event</div>
          <input value="{{ name }}" onInput="{{ setName }}" placeholder="Your Name" style="width:100%;margin-top:16px;padding:14px 16px;border-radius:14px;border:1.5px solid rgba(124,77,255,.16);font-family:'Inter';font-size:15px;background:#fff;outline:none;">
          <input value="{{ eventType }}" onInput="{{ setEventType }}" placeholder="Event Type (e.g. Birthday Party)" style="width:100%;margin-top:12px;padding:14px 16px;border-radius:14px;border:1.5px solid rgba(124,77,255,.16);font-family:'Inter';font-size:15px;background:#fff;outline:none;">
          <input value="{{ date }}" onFocus="{{ dateFocus }}" onBlur="{{ dateBlur }}" onInput="{{ setDate }}" type="{{ dateInputType }}" placeholder="Event Date" style="width:100%;margin-top:12px;padding:14px 16px;border-radius:14px;border:1.5px solid rgba(124,77,255,.16);font-family:'Inter';font-size:15px;background:#fff;outline:none;color:#2b2440;">
          <textarea value="{{ message }}" onInput="{{ setMessage }}" placeholder="Tell us more about your celebration…" rows="3" style="width:100%;margin-top:12px;padding:14px 16px;border-radius:14px;border:1.5px solid rgba(124,77,255,.16);font-family:'Inter';font-size:15px;background:#fff;outline:none;resize:vertical;"></textarea>
          <button type="submit" style="width:100%;margin-top:16px;font-family:'Poppins';font-weight:700;font-size:16px;color:#fff;padding:15px;border:none;border-radius:16px;cursor:pointer;background:linear-gradient(135deg,#FF5FA2,#FFA726,#7C4DFF);box-shadow:0 12px 26px rgba(255,95,162,.4);">Book Your Celebration →</button>
        </div>
      </sc-if>
    </form>
  </div>
</section>

<dc-import name="SiteFooter" hint-size="100%,360px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { name:"", eventType:"", date:"", message:"", submitted:false, dateActive:false };
  renderVals() {
    const s = this.state;
    return {
      name: s.name, eventType: s.eventType, date: s.date, message: s.message,
      submitted: s.submitted, notSubmitted: !s.submitted,
      dateInputType: (s.dateActive || s.date) ? "date" : "text",
      setName: e => this.setState({ name: e.target.value }),
      setEventType: e => this.setState({ eventType: e.target.value }),
      setDate: e => this.setState({ date: e.target.value }),
      setMessage: e => this.setState({ message: e.target.value }),
      dateFocus: () => this.setState({ dateActive: true }),
      dateBlur: () => this.setState({ dateActive: false }),
      onSubmit: e => { e.preventDefault(); this.setState({ submitted: true }); },
    };
  }
}
</script>
</body>
</html>
