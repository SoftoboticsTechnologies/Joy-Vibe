<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;} a{text-decoration:none;}</style>
</helmet>
<nav style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;padding:14px clamp(20px,5vw,64px);background:rgba(255,253,251,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(124,77,255,.08);font-family:'Inter',sans-serif;">
  <a href="index.html" style="display:flex;align-items:center;">
    <dc-import name="JoyVibeLogo" variant="lockup" hint-size="190px,48px"></dc-import>
  </a>
  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:26px;">
    <sc-for list="{{ links }}" as="l" hint-placeholder-count="6">
      <a href="{{ l.href }}" style="font-size:15px;color:{{ l.color }};font-weight:{{ l.weight }};padding-bottom:2px;border-bottom:2px solid {{ l.underline }};">{{ l.label }}</a>
    </sc-for>
  </div>
  <a href="contact.html" style="font-family:'Poppins';font-weight:600;font-size:14px;color:#fff;padding:11px 22px;border-radius:20px;background:linear-gradient(135deg,#FF5FA2,#FFA726,#7C4DFF);box-shadow:0 8px 20px rgba(255,95,162,.35);white-space:nowrap;">Book Event</a>
</nav>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:72},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;services&quot;,&quot;occasions&quot;,&quot;portfolio&quot;,&quot;about&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const a = this.props.active;
    const mk = (label, href, key) => ({
      label, href,
      color: a === key ? "#7C4DFF" : "#4a4360",
      weight: a === key ? "700" : "500",
      underline: a === key ? "#FF5FA2" : "transparent",
    });
    return { links: [
      mk("Home","index.html","home"),
      mk("Services","services.html","services"),
      mk("Occasions","occasions.html","occasions"),
      mk("Portfolio","portfolio.html","portfolio"),
      mk("About Us","about.html","about"),
      mk("Contact","contact.html","contact"),
    ]};
  }
}
</script>
</body>
</html>
